<svg xmlns="http://www.w3.org/2000/svg" width="840" height="500" viewBox="0 0 840 500" role="img" aria-labelledby="title desc">
  <title id="title">Week 2 PSNR vs Synthetic Misalignment Severity</title>
  <desc id="desc">Line plot of final validation PSNR versus synthetic misalignment severity for Kust4K and Caltech CART.</desc>
  <rect width="840" height="500" fill="#ffffff"/>
  <text x="420" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#222222">Week 2 Final Validation PSNR vs Synthetic Training Misalignment</text>
  <text x="420" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#555555">20 epochs, 256x320, pix2pix baseline, validation split</text>

  <line x1="70" y1="390" x2="760" y2="390" stroke="#222222" stroke-width="1.5"/>
  <line x1="70" y1="50" x2="70" y2="390" stroke="#222222" stroke-width="1.5"/>

  <g font-family="Arial, sans-serif" font-size="12" fill="#444444">
    <line x1="70" y1="390" x2="760" y2="390" stroke="#dddddd"/>
    <text x="60" y="394" text-anchor="end">14.0</text>
    <line x1="70" y1="329.3" x2="760" y2="329.3" stroke="#eeeeee"/>
    <text x="60" y="333.3" text-anchor="end">14.5</text>
    <line x1="70" y1="268.6" x2="760" y2="268.6" stroke="#eeeeee"/>
    <text x="60" y="272.6" text-anchor="end">15.0</text>
    <line x1="70" y1="207.9" x2="760" y2="207.9" stroke="#eeeeee"/>
    <text x="60" y="211.9" text-anchor="end">15.5</text>
    <line x1="70" y1="147.1" x2="760" y2="147.1" stroke="#eeeeee"/>
    <text x="60" y="151.1" text-anchor="end">16.0</text>
    <line x1="70" y1="86.4" x2="760" y2="86.4" stroke="#eeeeee"/>
    <text x="60" y="90.4" text-anchor="end">16.5</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="12" fill="#444444">
    <line x1="70" y1="390" x2="70" y2="396" stroke="#222222"/>
    <text x="70" y="416" text-anchor="middle">0.0</text>
    <line x1="208" y1="390" x2="208" y2="396" stroke="#222222"/>
    <text x="208" y="416" text-anchor="middle">0.1</text>
    <line x1="346" y1="390" x2="346" y2="396" stroke="#222222"/>
    <text x="346" y="416" text-anchor="middle">0.2</text>
    <line x1="484" y1="390" x2="484" y2="396" stroke="#222222"/>
    <text x="484" y="416" text-anchor="middle">0.3</text>
    <line x1="760" y1="390" x2="760" y2="396" stroke="#222222"/>
    <text x="760" y="416" text-anchor="middle">0.5</text>
  </g>

  <text x="415" y="456" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#222222">Synthetic misalignment severity sigma</text>
  <text transform="translate(22 220) rotate(-90)" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#222222">Final validation PSNR (dB)</text>

  <line x1="70" y1="347.0" x2="760" y2="347.0" stroke="#1f77b4" stroke-width="1.5" stroke-dasharray="6 5" opacity="0.45"/>
  <line x1="70" y1="334.6" x2="760" y2="334.6" stroke="#d62728" stroke-width="1.5" stroke-dasharray="6 5" opacity="0.45"/>
  <text x="758" y="342" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#1f77b4">Kust4K baseline - 2 dB</text>
  <text x="758" y="329" text-anchor="end" font-family="Arial, sans-serif" font-size="11" fill="#d62728">CART baseline - 2 dB</text>

  <polyline points="70,104.2 208,137.9 346,184.9 484,146.3 760,219.0" fill="none" stroke="#1f77b4" stroke-width="3"/>
  <polyline points="70,91.8 208,97.5 346,176.1 484,114.3 760,148.5" fill="none" stroke="#d62728" stroke-width="3"/>

  <g fill="#1f77b4" stroke="#ffffff" stroke-width="1.5">
    <circle cx="70" cy="104.2" r="5"/>
    <circle cx="208" cy="137.9" r="5"/>
    <circle cx="346" cy="184.9" r="5"/>
    <circle cx="484" cy="146.3" r="5"/>
    <circle cx="760" cy="219.0" r="5"/>
  </g>
  <g fill="#d62728" stroke="#ffffff" stroke-width="1.5">
    <circle cx="70" cy="91.8" r="5"/>
    <circle cx="208" cy="97.5" r="5"/>
    <circle cx="346" cy="176.1" r="5"/>
    <circle cx="484" cy="114.3" r="5"/>
    <circle cx="760" cy="148.5" r="5"/>
  </g>

  <g font-family="Arial, sans-serif" font-size="13" fill="#222222">
    <rect x="590" y="70" width="185" height="62" fill="#ffffff" stroke="#dddddd"/>
    <line x1="608" y1="90" x2="648" y2="90" stroke="#1f77b4" stroke-width="3"/>
    <circle cx="628" cy="90" r="5" fill="#1f77b4" stroke="#ffffff" stroke-width="1.5"/>
    <text x="660" y="94">Kust4K</text>
    <line x1="608" y1="114" x2="648" y2="114" stroke="#d62728" stroke-width="3"/>
    <circle cx="628" cy="114" r="5" fill="#d62728" stroke="#ffffff" stroke-width="1.5"/>
    <text x="660" y="118">Caltech CART</text>
  </g>
</svg>
